<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Love Launcher</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --pink: #ff2d6b;
    --pink-dark: #c4004a;
    --pink-glow: rgba(255, 45, 107, 0.5);
    --bg: #0a0a0f;
    --bg2: #12101a;
    --text: #ffffff;
    --gray: #888;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Montserrat', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: space-between;
    padding: 48px 24px 40px;
    overflow: hidden;
    position: relative;
  }

  /* Ambient background glow */
  body::before {
    content: '';
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(255,45,107,0.12) 0%, transparent 70%);
    pointer-events: none;
    transition: opacity 0.5s;
  }

  body.fired::before {
    background: radial-gradient(circle, rgba(255,45,107,0.35) 0%, transparent 70%);
  }

  /* Title */
  .title {
    text-align: center;
    z-index: 1;
  }

  .title h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 42px;
    letter-spacing: 4px;
    line-height: 1;
  }

  .title h1 span.love {
    color: var(--pink);
  }

  .title h1 span.launcher {
    color: white;
  }

  .title p {
    font-size: 10px;
    letter-spacing: 6px;
    color: var(--gray);
    margin-top: 6px;
    text-transform: uppercase;
  }

  /* BLE Status */
  .ble-status {
    display: flex;
    align-items: center;
    gap: 8px;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 999px;
    padding: 8px 18px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    z-index: 1;
    transition: all 0.4s;
    cursor: pointer;
    background: rgba(255,255,255,0.03);
  }

  .ble-status.connected {
    border-color: rgba(0, 255, 120, 0.4);
    background: rgba(0, 255, 120, 0.05);
  }

  .ble-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--gray);
    transition: background 0.4s;
    flex-shrink: 0;
  }

  .ble-status.connected .ble-dot {
    background: #00ff78;
    box-shadow: 0 0 6px #00ff78;
    animation: pulse-dot 2s infinite;
  }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .ble-icon {
    font-size: 13px;
  }

  .ble-text { color: var(--gray); transition: color 0.4s; }
  .ble-status.connected .ble-text { color: #00ff78; }

  /* Big launch button */
  .btn-wrap {
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* Outer glow rings */
  .ring {
    position: absolute;
    border-radius: 50%;
    border: 1px solid var(--pink-glow);
    animation: ring-pulse 3s infinite;
    pointer-events: none;
  }

  .ring:nth-child(1) { width: 320px; height: 320px; opacity: 0.3; animation-delay: 0s; }
  .ring:nth-child(2) { width: 370px; height: 370px; opacity: 0.15; animation-delay: 0.8s; }
  .ring:nth-child(3) { width: 420px; height: 420px; opacity: 0.07; animation-delay: 1.6s; }

  @keyframes ring-pulse {
    0%, 100% { transform: scale(1); opacity: inherit; }
    50% { transform: scale(1.03); opacity: 0; }
  }

  .launch-btn {
    width: 260px;
    height: 260px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    position: relative;
    background: radial-gradient(circle at 35% 35%, #ff6b9d, #ff2d6b 50%, #a0003d);
    box-shadow:
      0 0 40px rgba(255,45,107,0.5),
      0 0 80px rgba(255,45,107,0.2),
      inset 0 4px 20px rgba(255,255,255,0.2),
      inset 0 -4px 20px rgba(0,0,0,0.3);
    transition: transform 0.15s, box-shadow 0.15s;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    -webkit-user-select: none;
    user-select: none;
  }

  .launch-btn:active {
    transform: scale(0.94);
    box-shadow:
      0 0 20px rgba(255,45,107,0.4),
      0 0 40px rgba(255,45,107,0.15),
      inset 0 4px 20px rgba(0,0,0,0.3),
      inset 0 -2px 10px rgba(255,255,255,0.1);
  }

  .launch-btn.disabled {
    background: radial-gradient(circle at 35% 35%, #555, #333 50%, #222);
    box-shadow: none;
    cursor: not-allowed;
  }

  .launch-btn .icon {
    font-size: 36px;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.4));
  }

  .launch-btn .label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    letter-spacing: 4px;
    color: white;
    text-shadow: 0 2px 8px rgba(0,0,0,0.5);
  }

  /* Flash animation on fire */
  @keyframes flash {
    0% { transform: scale(1); }
    30% { transform: scale(0.92); }
    60% { transform: scale(1.04); }
    100% { transform: scale(1); }
  }

  .launch-btn.firing {
    animation: flash 0.4s ease;
  }

  /* Status text */
  .status-text {
    text-align: center;
    z-index: 1;
  }

  .status-text .main {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: white;
  }

  .status-text .sub {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--gray);
    margin-top: 4px;
    text-transform: uppercase;
  }

  /* Toast notification */
  .toast {
    position: fixed;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.15);
    padding: 10px 20px;
    border-radius: 999px;
    font-size: 12px;
    letter-spacing: 1px;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    white-space: nowrap;
  }

  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
</style>
</head>
<body>

<div class="title">
  <h1><span class="love">LOVE</span> <span class="launcher">LAUNCHER</span></h1>
  <p>Wireless Edition</p>
</div>

<div class="ble-status" id="bleStatus" onclick="connectBLE()">
  <span class="ble-icon">⚡</span>
  <div class="ble-dot" id="bleDot"></div>
  <span class="ble-text" id="bleText">TAP TO CONNECT</span>
</div>

<div class="btn-wrap">
  <div class="ring"></div>
  <div class="ring"></div>
  <div class="ring"></div>
  <button class="launch-btn disabled" id="launchBtn" onclick="fire()">
    <span class="icon">💝</span>
    <span class="label">LAUNCH</span>
  </button>
</div>

<div class="status-text">
  <div class="main" id="mainStatus">Połącz się aby zacząć</div>
  <div class="sub" id="subStatus">Naciśnij przycisk connect</div>
</div>

<div class="toast" id="toast"></div>

<script>
  // BLE UUIDs - muszą pasować do kodu ESP
  const SERVICE_UUID = '12345678-1234-1234-1234-123456789abc';
  const CHAR_UUID    = 'abcd1234-ab12-ab12-ab12-abcdef123456';

  let bleDevice = null;
  let bleChar   = null;
  let connected = false;

  function showToast(msg, duration = 2500) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), duration);
  }

  async function connectBLE() {
    if (connected) {
      bleDevice?.gatt?.disconnect();
      return;
    }

    if (!navigator.bluetooth) {
      showToast('⚠️ Web Bluetooth niedostępny – użyj Chrome na Android');
      return;
    }

    try {
      showToast('🔍 Szukam Love Launchera...');
      bleDevice = await navigator.bluetooth.requestDevice({
        filters: [{ name: 'LoveLauncher' }],
        optionalServices: [SERVICE_UUID]
      });

      bleDevice.addEventListener('gattserverdisconnected', onDisconnected);

      const server  = await bleDevice.gatt.connect();
      const service = await server.getPrimaryService(SERVICE_UUID);
      bleChar        = await service.getCharacteristic(CHAR_UUID);

      onConnected();
    } catch (e) {
      showToast('❌ ' + (e.message || 'Błąd połączenia'));
    }
  }

  function onConnected() {
    connected = true;
    document.getElementById('bleStatus').classList.add('connected');
    document.getElementById('bleText').textContent = 'CONNECTED';
    document.getElementById('launchBtn').classList.remove('disabled');
    document.getElementById('mainStatus').textContent = 'Gotowy do startu';
    document.getElementById('subStatus').textContent = 'Naciśnij aby wystrzelić';
    showToast('✅ Połączono z Love Launcherem!');
  }

  function onDisconnected() {
    connected = false;
    bleChar = null;
    document.getElementById('bleStatus').classList.remove('connected');
    document.getElementById('bleText').textContent = 'TAP TO CONNECT';
    document.getElementById('launchBtn').classList.add('disabled');
    document.getElementById('mainStatus').textContent = 'Połącz się aby zacząć';
    document.getElementById('subStatus').textContent = 'Naciśnij przycisk connect';
    showToast('🔌 Rozłączono');
  }

  async function fire() {
    if (!connected || !bleChar) {
      showToast('⚠️ Najpierw połącz się!');
      return;
    }

    const btn = document.getElementById('launchBtn');
    btn.classList.add('firing');
    document.body.classList.add('fired');
    setTimeout(() => {
      btn.classList.remove('firing');
      document.body.classList.remove('fired');
    }, 500);

    try {
      const encoder = new TextEncoder();
      await bleChar.writeValue(encoder.encode('FIRE'));
      showToast('🚀 Wystrzelono!');
      document.getElementById('mainStatus').textContent = '🚀 Wystrzelono!';
      setTimeout(() => {
        document.getElementById('mainStatus').textContent = 'Gotowy do startu';
      }, 2000);
    } catch (e) {
      showToast('❌ Błąd wysyłania');
    }
  }
</script>
</body>
</html>
